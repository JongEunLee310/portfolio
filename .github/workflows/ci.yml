name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Content integrity
        run: pnpm check:content

      - name: Image paths
        run: pnpm check:image-paths

      - name: Structure drift
        run: pnpm check:structure

      - name: Docs drift
        run: pnpm check:docs-drift

      - name: Build
        run: pnpm build
