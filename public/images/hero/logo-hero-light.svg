<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LJE Logo Light Transparent</title>
  <desc id="desc">A transparent-background light mode code-style logo reading &lt;LJE/&gt; with charcoal and gold colors.</desc>
  <defs>
    <linearGradient id="charcoal" x1="0" y1="120" x2="0" y2="285" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3A4146"/>
      <stop offset="0.55" stop-color="#1F2529"/>
      <stop offset="1" stop-color="#14191D"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="105" x2="0" y2="295" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2CE74"/>
      <stop offset="0.45" stop-color="#D9A735"/>
      <stop offset="1" stop-color="#B87918"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#121416" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)" font-family="Inter, Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="178" letter-spacing="10">
    <text x="600" y="255" text-anchor="middle">
      <tspan fill="url(#charcoal)">&lt;LJ</tspan><tspan fill="url(#gold)">E</tspan><tspan fill="url(#charcoal)">/&gt;</tspan>
    </text>
  </g>
</svg>
