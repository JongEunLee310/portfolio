<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LJE Logo Dark Blue Transparent</title>
  <desc id="desc">A transparent-background dark mode code-style logo reading &lt;LJE/&gt; with silver-blue and electric blue colors.</desc>
  <defs>
    <linearGradient id="silverBlue" x1="0" y1="105" x2="0" y2="295" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2F8FF"/>
      <stop offset="0.45" stop-color="#A9CAE8"/>
      <stop offset="1" stop-color="#6F96B7"/>
    </linearGradient>
    <linearGradient id="electricBlue" x1="0" y1="105" x2="0" y2="295" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6EF0FF"/>
      <stop offset="0.45" stop-color="#16A9FF"/>
      <stop offset="1" stop-color="#006AF5"/>
    </linearGradient>
    <filter id="blueGlow" x="-25%" y="-45%" width="150%" height="190%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#00A8FF" flood-opacity="0.75"/>
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#006DFF" flood-opacity="0.42"/>
    </filter>
    <filter id="softTextShadow" x="-15%" y="-20%" width="130%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#000814" flood-opacity="0.55"/>
    </filter>
  </defs>

  <g font-family="Inter, Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="178" letter-spacing="10" filter="url(#softTextShadow)">
    <text x="600" y="255" text-anchor="middle">
      <tspan fill="url(#silverBlue)">&lt;LJ</tspan><tspan fill="url(#electricBlue)" filter="url(#blueGlow)">E</tspan><tspan fill="url(#silverBlue)">/&gt;</tspan>
    </text>
  </g>
</svg>
